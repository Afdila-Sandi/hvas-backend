ServerName localhost
Listen 8443

# Memuat modul-modul penting Apache
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule dir_module modules/mod_dir.so

# Konfigurasi Log
ErrorLog /proc/self/fd/2
LogLevel warn

<VirtualHost *:8443>
    # Mengaktifkan Enkripsi SSL
    SSLEngine on
    SSLCertificateFile "/usr/local/apache2/certs/hvas.crt"
    SSLCertificateKeyFile "/usr/local/apache2/certs/hvas.key"

    # Meneruskan lalu lintas HTTP ke API Gateway
    ProxyPass /api http://api-gateway:5000/api
    ProxyPassReverse /api http://api-gateway:5000/api

    # Meneruskan lalu lintas WebSocket ke API Gateway
    ProxyPass /ws/monitor ws://api-gateway:5000/ws/monitor
    ProxyPassReverse /ws/monitor ws://api-gateway:5000/ws/monitor

    ProxyPass /ws/control ws://api-gateway:5000/ws/control
    ProxyPassReverse /ws/control ws://api-gateway:5000/ws/control

    # Direktori tempat file Vue.js Anda akan diletakkan nanti
    DocumentRoot "/usr/local/apache2/htdocs"
    <Directory "/usr/local/apache2/htdocs">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>