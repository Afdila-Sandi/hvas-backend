version: "3.8"

# Jaringan internal untuk komunikasi antar kontainer
networks:
  hvas-net:
    driver: bridge

services:
  # Basis data untuk Auth Service
  postgres-auth:
    image: postgres:15-alpine
    container_name: hvas-postgres-auth
    restart: always
    env_file:
      - ./auth-service/.env
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hvas-net

  # Basis data untuk Monitoring Service
  postgres-monitor:
    image: postgres:15-alpine
    container_name: hvas-postgres-monitor
    restart: always
    env_file:
      - ./monitoring-service/.env
    volumes:
      - pgdata_monitor:/var/lib/postgresql/data
      - ./monitoring-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hvas-net

  # Broker MQTT untuk komunikasi IoT
  mosquitto:
    image: eclipse-mosquitto:1.6.15
    container_name: hvas-mqtt
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      - hvas-net

  # Layanan Autentikasi
  auth-service:
    build: ./auth-service
    container_name: hvas-auth
    restart: always
    env_file:
      - ./auth-service/.env
    depends_on:
      - postgres-auth
    networks:
      - hvas-net

  # Layanan Monitoring Sensor
  monitoring-service:
    build: ./monitoring-service
    container_name: hvas-monitor
    restart: always
    env_file:
      - ./monitoring-service/.env
    depends_on:
      - postgres-monitor
      - mosquitto
    networks:
      - hvas-net

  # Layanan Kendali Alat
  control-service:
    build: ./control-service
    container_name: hvas-control
    restart: always
    env_file:
      - ./control-service/.env
    depends_on:
      - mosquitto
    networks:
      - hvas-net

  # Gerbang API Internal
  api-gateway:
    build: ./api-gateway
    container_name: hvas-api-gateway
    restart: always
    depends_on:
      - auth-service
      - monitoring-service
      - control-service
    networks:
      - hvas-net

# Deklarasi volume untuk persistensi data basis data
volumes:
  pgdata_auth:
  pgdata_monitor:
