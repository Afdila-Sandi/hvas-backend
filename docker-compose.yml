networks:
  hvas-net:
    driver: bridge

services:
 #router sslh port 8000
  sslh:
    image: alpine:latest
    container_name: hvas-sslh
    restart: always
    command: sh -c "apk add --no-cache sslh && sslh -f -u root -F /etc/sslh.cfg"
    ports:
      - "8000:8000" 
    volumes:
      - ./sslh.conf:/etc/sslh.cfg:ro
    networks:
      - hvas-net

  #web server apache
  apache-vue:
    image: httpd:alpine
    container_name: hvas-apache
    restart: always
    expose:
      - "8443" 
    volumes:
      - ./apache.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./certs:/usr/local/apache2/certs:ro
    networks:
      - hvas-net

  #mqtt
  mosquitto:
    image: eclipse-mosquitto:1.6.15
    container_name: hvas-mqtt
    restart: always
    expose:
      - "8883" 
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./certs:/mosquitto/config/certs/certs:ro
    networks:
      - hvas-net

  #database
  postgres-auth:
    image: postgres:15-alpine
    container_name: hvas-postgres-auth
    restart: always
    env_file:
      - ./auth-service/.env
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hvas-net
  
  postgres-monitor:
    image: postgres:15-alpine
    container_name: hvas-postgres-monitor
    restart: always
    env_file:
      - ./monitoring-service/.env
    volumes:
      - pgdata_monitor:/var/lib/postgresql/data
      - ./monitoring-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hvas-net

  auth-service:
    build: ./auth-service
    container_name: hvas-auth
    restart: always
    env_file:
      - ./auth-service/.env
    depends_on:
      - postgres-auth
    networks:
      - hvas-net

  monitoring-service:
    build: ./monitoring-service
    container_name: hvas-monitor
    restart: always
    env_file:
      - ./monitoring-service/.env
    depends_on:
      - postgres-monitor
      - mosquitto
    networks:
      - hvas-net

  control-service:
    build: ./control-service
    container_name: hvas-control
    restart: always
    env_file:
      - ./control-service/.env
    depends_on:
      - mosquitto
    networks:
      - hvas-net

  api-gateway:
    build: ./api-gateway
    container_name: hvas-api-gateway
    restart: always
    expose:
      - "5000" 
    depends_on:
      - auth-service
      - monitoring-service
      - control-service
    networks:
      - hvas-net

volumes:
  pgdata_auth:
  pgdata_monitor: